<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Natural VPS - User Dashboard v5">
    <title>Natural VPS - Dashboard</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%234a8a3e'>LEAF</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/design-system.css">
    
    <style>
        /* Dashboard Layout */
        .dashboard-wrapper {
            background: linear-gradient(135deg, #0a1f1a 0%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .dashboard-nav {
            background: rgba(10, 31, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(74, 138, 62, 0.3);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .nav-brand {
            font-size: 22px;
            font-weight: 800;
            color: #f0ece0;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInLeft 0.6s ease-out;
        }

        .nav-brand i {
            font-size: 28px;
            color: #4a8a3e;
            animation: pulse 2s infinite;
        }

        .nav-center {
            display: flex;
            gap: 30px;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .nav-link {
            color: #a0b8a0;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-link:hover {
            color: #4a8a3e;
        }

        .nav-link.active {
            color: #4a8a3e;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4a8a3e;
            transition: width 0.3s ease;
        }

        .nav-link.active::after,
        .nav-link:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(74, 138, 62, 0.15);
            border-radius: 12px;
            color: #a0b8a0;
            font-size: 14px;
            border: 1px solid rgba(74, 138, 62, 0.3);
            transition: all 0.3s ease;
        }

        .nav-user:hover {
            background: rgba(74, 138, 62, 0.25);
            border-color: rgba(74, 138, 62, 0.5);
        }

        .nav-btn {
            background: #4a8a3e;
            color: #f0ece0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #6aaa5a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 138, 62, 0.3);
        }

        .nav-btn.logout {
            background: #c85c5c;
        }

        .nav-btn.logout:hover {
            background: #e8756f;
            box-shadow: 0 8px 20px rgba(200, 92, 92, 0.3);
        }

        /* Main Content */
        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
        }

        /* Welcome Section */
        .welcome-section {
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .welcome-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .welcome-header h1 {
            font-size: 36px;
            font-weight: 800;
            color: #f0ece0;
            margin-bottom: 8px;
        }

        .welcome-header p {
            color: #a0b8a0;
            font-size: 16px;
        }

        .account-timer {
            background: rgba(200, 92, 92, 0.1);
            border: 2px solid rgba(200, 92, 92, 0.3);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e8756f;
            font-weight: 600;
            font-size: 13px;
            animation: slideInRight 0.6s ease-out;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(30, 61, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(74, 138, 62, 0.2);
            padding: 24px;
            border-radius: 16px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        .stat-card:hover {
            background: rgba(30, 61, 42, 0.8);
            border-color: rgba(74, 138, 62, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(74, 138, 62, 0.2);
        }

        .stat-icon {
            font-size: 28px;
            color: #4a8a3e;
            margin-bottom: 12px;
            animation: fadeIn 1s ease-out;
        }

        .stat-label {
            color: #a0b8a0;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #f0ece0;
        }

        /* Tab Navigation */
        .tabs-container {
            margin-top: 40px;
        }

        .tabs-header {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid rgba(74, 138, 62, 0.2);
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #a0b8a0;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #4a8a3e;
        }

        .tab-btn.active {
            color: #4a8a3e;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4a8a3e;
            transition: width 0.3s ease;
        }

        .tab-btn.active::after {
            width: 100%;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* VM Grid */
        .vm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .vm-card {
            background: rgba(30, 61, 42, 0.5);
            border: 2px solid rgba(74, 138, 62, 0.2);
            border-radius: 14px;
            padding: 20px;
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease-out;
        }

        .vm-card:hover {
            background: rgba(30, 61, 42, 0.7);
            border-color: rgba(74, 138, 62, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(74, 138, 62, 0.15);
        }

        .vm-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .vm-name {
            font-size: 18px;
            font-weight: 700;
            color: #f0ece0;
        }

        .vm-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vm-status.running {
            background: rgba(74, 138, 62, 0.2);
            color: #6aaa5a;
        }

        .vm-status.creating {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .vm-status.error {
            background: rgba(200, 92, 92, 0.2);
            color: #e8756f;
        }

        .vm-details {
            font-size: 13px;
            color: #a0b8a0;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .vm-details div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .vm-details label {
            font-weight: 600;
            color: #c0d8c0;
        }

        .vm-actions {
            display: flex;
            gap: 8px;
        }

        .vm-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(74, 138, 62, 0.3);
            background: rgba(74, 138, 62, 0.1);
            color: #4a8a3e;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .vm-btn:hover {
            background: rgba(74, 138, 62, 0.2);
            border-color: rgba(74, 138, 62, 0.5);
        }

        .vm-btn.danger {
            color: #c85c5c;
            border-color: rgba(200, 92, 92, 0.3);
            background: rgba(200, 92, 92, 0.1);
        }

        .vm-btn.danger:hover {
            background: rgba(200, 92, 92, 0.2);
            border-color: rgba(200, 92, 92, 0.5);
        }

        /* Form Section */
        .form-section {
            background: rgba(30, 61, 42, 0.4);
            border: 2px solid rgba(74, 138, 62, 0.2);
            border-radius: 14px;
            padding: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #c0d8c0;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 61, 42, 0.6);
            border: 2px solid rgba(74, 138, 62, 0.2);
            border-radius: 8px;
            color: #f0ece0;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #4a8a3e;
            background: rgba(30, 61, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(74, 138, 62, 0.1);
        }

        .form-btn {
            width: 100%;
            padding: 12px 24px;
            background: #4a8a3e;
            color: #f0ece0;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-btn:hover {
            background: #6aaa5a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 138, 62, 0.3);
        }

        .form-btn:active {
            transform: translateY(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0b8a0;
        }

        .empty-state i {
            font-size: 64px;
            color: #4a8a3e;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #f0ece0;
            margin-bottom: 10px;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(74, 138, 62, 0.2);
            border-top-color: #4a8a3e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-center {
                flex-basis: 100%;
                justify-content: space-around;
                gap: 10px;
            }

            .welcome-header {
                flex-direction: column;
                gap: 12px;
            }

            .welcome-header h1 {
                font-size: 28px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .vm-grid {
                grid-template-columns: 1fr;
            }

            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="dashboard-nav">
        <div class="nav-brand">
            <i class="fas fa-leaf"></i>
            Natural VPS
        </div>
        <div class="nav-center">
            <a href="#my-vms" class="nav-link active" onclick="switchTab('my-vms'); return false;">My VMs</a>
            <a href="#create-vm" class="nav-link" onclick="switchTab('create-vm'); return false;">Create New</a>
            <a href="#admin" class="nav-link" onclick="switchTab('admin'); return false;">Admin</a>
        </div>
        <div class="nav-actions">
            <div class="nav-user">
                <i class="fas fa-user"></i>
                <span id="user-display">User</span>
            </div>
            <div class="account-timer" id="account-timer" title="Account expires in">
                <i class="fas fa-hourglass-end"></i> <span id="timer-text">Loading...</span>
            </div>
            <button class="nav-btn logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="dashboard-content">
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-header">
                <div>
                    <h1>Welcome, <span id="username-display">User</span>!</h1>
                    <p>Manage your VMs and resources</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-server"></i></div>
                    <div class="stat-label">Total VMs</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-label">Running</div>
                    <div class="stat-value" id="stat-running">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-limit"></i></div>
                    <div class="stat-label">VM Quota</div>
                    <div class="stat-value"><span id="stat-current">0</span>/<span id="stat-limit">3</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-label">Account Life</div>
                    <div class="stat-value" id="stat-lifetime">3h</div>
                </div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('my-vms')">My VMs</button>
                <button class="tab-btn" onclick="switchTab('create-vm')">Create New</button>
                <button class="tab-btn" id="admin-tab" onclick="switchTab('admin')" style="display:none;">Admin Panel</button>
            </div>

            <!-- My VMs Tab -->
            <div id="my-vms" class="tab-content active">
                <div class="vm-grid" id="vm-list"></div>
            </div>

            <!-- Create VM Tab -->
            <div id="create-vm" class="tab-content">
                <div class="form-section">
                    <h2 style="color: #f0ece0; margin-bottom: 20px;">Create New VM</h2>
                    <form onsubmit="createVM(event)">
                        <div class="form-group">
                            <label class="form-label">VM Name</label>
                            <input type="text" id="vm-name" class="form-input" placeholder="My Dev Server" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Operating System</label>
                            <select id="vm-os" class="form-select">
                                <option value="ubuntu">Ubuntu 22.04 LTS</option>
                                <option value="debian">Debian 12</option>
                                <option value="centos">AlmaLinux 9</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">GitHub Token</label>
                            <input type="password" id="vm-github" class="form-input" placeholder="ghp_..." required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tailscale Key</label>
                            <input type="password" id="vm-tailscale" class="form-input" placeholder="tskey-..." required>
                        </div>
                        <button type="submit" class="form-btn">
                            <i class="fas fa-plus"></i> Create VM
                        </button>
                    </form>
                </div>
            </div>

            <!-- Admin Tab -->
            <div id="admin" class="tab-content">
                <div class="form-section">
                    <h2 style="color: #f0ece0; margin-bottom: 20px;">Admin Panel</h2>
                    <p style="color: #a0b8a0; margin-bottom: 20px;">
                        <i class="fas fa-lock"></i> Admin access restricted
                    </p>
                    <a href="/admin" class="form-btn" style="text-align: center; text-decoration: none; display: inline-block; width: auto;">
                        Go to Admin Panel
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUser = null;

        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth';
                return;
            }

            await loadUserProfile();
            await loadVMs();
            await loadAccountStatus();
            startAccountTimer();
        });

        async function loadUserProfile() {
            try {
                const response = await fetch(`${API_BASE}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.user;
                    document.getElementById('username-display').textContent = currentUser.web_username;
                    document.getElementById('user-display').textContent = currentUser.web_username;
                    
                    if (currentUser.is_admin) {
                        document.getElementById('admin-tab').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }

        async function loadVMs() {
            try {
                const response = await fetch(`${API_BASE}/vms`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success && data.vms.length > 0) {
                    renderVMs(data.vms);
                    updateStats(data.vms);
                } else {
                    document.getElementById('vm-list').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>No VMs Yet</h3>
                            <p>Create your first VM to get started</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load VMs:', error);
            }
        }

        function renderVMs(vms) {
            let html = '';
            for (const vm of vms) {
                html += `
                    <div class="vm-card">
                        <div class="vm-header">
                            <div class="vm-name">${vm.name}</div>
                            <div class="vm-status ${vm.status}">${vm.status}</div>
                        </div>
                        <div class="vm-details">
                            <div><label>OS:</label> <span>${vm.os_type}</span></div>
                            <div><label>Status:</label> <span style="color: #4a8a3e;">${vm.status}</span></div>
                            <div><label>Created:</label> <span>${new Date(vm.created_at).toLocaleDateString()}</span></div>
                            ${vm.ssh_command ? `<div><label>SSH:</label> <code style="font-size: 11px; color: #6aaa5a;">${vm.ssh_command}</code></div>` : ''}
                        </div>
                        <div class="vm-actions">
                            <button class="vm-btn" onclick="copyToClipboard('${vm.ssh_command}')">
                                <i class="fas fa-copy"></i> Copy SSH
                            </button>
                            <button class="vm-btn danger" onclick="deleteVM('${vm.id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('vm-list').innerHTML = html;
        }

        function updateStats(vms) {
            const total = vms.length;
            const running = vms.filter(v => v.status === 'running').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-running').textContent = running;
            document.getElementById('stat-current').textContent = total;
        }

        async function loadAccountStatus() {
            try {
                const response = await fetch(`${API_BASE}/auth/account-status`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const status = data.account_status;
                    document.getElementById('stat-lifetime').textContent = 
                        status.time_remaining_hours ? `${Math.floor(status.time_remaining_hours)}h` : '∞';
                    document.getElementById('stat-limit').textContent = 
                        status.vms.limit !== 'unlimited' ? status.vms.limit : '∞';
                }
            } catch (error) {
                console.error('Failed to load account status:', error);
            }
        }

        function startAccountTimer() {
            setInterval(async () => {
                await loadAccountStatus();
            }, 60000); // Update every minute
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Deactivate all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Activate button
            event.target.classList.add('active');
        }

        async function createVM(event) {
            event.preventDefault();
            
            const button = event.target.querySelector('button');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            
            try {
                const response = await fetch(`${API_BASE}/vms/create`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: document.getElementById('vm-name').value,
                        os: document.getElementById('vm-os').value,
                        github_token: document.getElementById('vm-github').value,
                        tailscale_key: document.getElementById('vm-tailscale').value
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('VM created successfully!');
                    event.target.reset();
                    await loadVMs();
                    switchTab('my-vms');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed to create VM: ' + error.message);
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-plus"></i> Create VM';
            }
        }

        async function deleteVM(vmId) {
            if (!confirm('Are you sure you want to delete this VM?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/vms/${vmId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('VM deleted successfully');
                    await loadVMs();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed to delete VM: ' + error.message);
            }
        }

        function copyToClipboard(text) {
            if (!text) {
                alert('SSH command not yet available');
                return;
            }
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }

        function logout() {
            fetch(`${API_BASE}/auth/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            }).then(() => {
                localStorage.removeItem('token');
                window.location.href = '/auth';
            });
        }
    </script>
</body>
</html>
