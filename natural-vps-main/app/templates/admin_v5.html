<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Natural VPS - Admin Panel v5">
    <title>Natural VPS - Admin Panel</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%234a8a3e'>LEAF</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/design-system.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a1f1a 0%, #1a3a2a 100%);
            color: #f0ece0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(10, 31, 26, 0.95);
            backdrop-filter: blur(20px);
            border-right: 2px solid rgba(74, 138, 62, 0.3);
            padding: 20px;
            overflow-y: auto;
            animation: slideInLeft 0.6s ease-out;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #f0ece0;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(74, 138, 62, 0.2);
        }

        .sidebar-brand i {
            font-size: 28px;
            color: #4a8a3e;
            animation: pulse 2s infinite;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #a0b8a0;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .sidebar-link:hover {
            background: rgba(74, 138, 62, 0.1);
            color: #4a8a3e;
            transform: translateX(4px);
        }

        .sidebar-link.active {
            background: rgba(74, 138, 62, 0.2);
            color: #4a8a3e;
            border-left: 3px solid #4a8a3e;
            padding-left: 13px;
        }

        .sidebar-link i {
            font-size: 16px;
            width: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(74, 138, 62, 0.2);
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title h1 {
            font-size: 32px;
            font-weight: 800;
        }

        .page-title i {
            font-size: 32px;
            color: #4a8a3e;
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(74, 138, 62, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(74, 138, 62, 0.3);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(30, 61, 42, 0.5);
            border: 2px solid rgba(74, 138, 62, 0.2);
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease-out;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(74, 138, 62, 0.4);
        }

        .stat-icon {
            font-size: 28px;
            color: #4a8a3e;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #a0b8a0;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(74, 138, 62, 0.2);
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #a0b8a0;
            cursor: pointer;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: #4a8a3e;
        }

        .tab.active {
            color: #4a8a3e;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4a8a3e;
            transition: width 0.3s ease;
        }

        .tab.active::after {
            width: 100%;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        /* Table */
        .table-container {
            background: rgba(30, 61, 42, 0.4);
            border: 2px solid rgba(74, 138, 62, 0.2);
            border-radius: 12px;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(74, 138, 62, 0.15);
            border-bottom: 2px solid rgba(74, 138, 62, 0.3);
        }

        th {
            padding: 16px;
            text-align: left;
            color: #c0d8c0;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(74, 138, 62, 0.1);
            color: #a0b8a0;
            font-size: 14px;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(74, 138, 62, 0.05);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.active {
            background: rgba(74, 138, 62, 0.2);
            color: #6aaa5a;
        }

        .badge.inactive {
            background: rgba(200, 92, 92, 0.2);
            color: #e8756f;
        }

        .badge.admin {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .action-btn {
            padding: 6px 12px;
            margin-right: 6px;
            border: 1px solid rgba(74, 138, 62, 0.3);
            background: rgba(74, 138, 62, 0.1);
            color: #4a8a3e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(74, 138, 62, 0.2);
            border-color: rgba(74, 138, 62, 0.5);
        }

        .action-btn.danger {
            color: #c85c5c;
            border-color: rgba(200, 92, 92, 0.3);
            background: rgba(200, 92, 92, 0.1);
        }

        .action-btn.danger:hover {
            background: rgba(200, 92, 92, 0.2);
            border-color: rgba(200, 92, 92, 0.5);
        }

        /* Form */
        .form-card {
            background: rgba(30, 61, 42, 0.5);
            border: 2px solid rgba(74, 138, 62, 0.2);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            color: #c0d8c0;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(30, 61, 42, 0.6);
            border: 2px solid rgba(74, 138, 62, 0.2);
            border-radius: 8px;
            color: #f0ece0;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #4a8a3e;
            box-shadow: 0 0 0 3px rgba(74, 138, 62, 0.1);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid rgba(74, 138, 62, 0.3);
                padding: 15px;
            }

            .main-content {
                padding: 20px;
            }

            .page-title h1 {
                font-size: 24px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-leaf"></i>
                Natural VPS
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a class="sidebar-link active" onclick="switchTab('dashboard')">
                        <i class="fas fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link" onclick="switchTab('users')">
                        <i class="fas fa-users"></i>
                        User Management
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link" onclick="switchTab('vms')">
                        <i class="fas fa-server"></i>
                        VM Management
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link" onclick="switchTab('create-account')">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link" onclick="switchTab('audit-logs')">
                        <i class="fas fa-file-alt"></i>
                        Audit Logs
                    </a>
                </li>
                <li class="sidebar-item">
                    <a class="sidebar-link" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <i id="page-icon" class="fas fa-chart-line"></i>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="admin-user">
                    <i class="fas fa-shield-alt"></i>
                    <span id="admin-name">Admin</span>
                </div>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <div class="stats-grid" id="dashboard-stats"></div>
            </div>

            <!-- Users Tab -->
            <div id="users" class="tab-content">
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Real Email</th>
                                <th>Status</th>
                                <th>VMs</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-list"></tbody>
                    </table>
                </div>
            </div>

            <!-- VMs Tab -->
            <div id="vms" class="tab-content">
                <div class="table-container">
                    <table id="vms-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>User</th>
                                <th>Status</th>
                                <th>OS</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vms-list"></tbody>
                    </table>
                </div>
            </div>

            <!-- Create Account Tab -->
            <div id="create-account" class="tab-content">
                <div class="form-card">
                    <h2 style="margin-bottom: 20px;">Create New Account</h2>
                    <form onsubmit="createAccount(event)">
                        <div class="form-group">
                            <label class="form-label">Real Email</label>
                            <input type="email" id="new-email" class="form-input" placeholder="user@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Account Lifetime (hours)</label>
                            <select id="new-lifetime" class="form-input">
                                <option value="3">3 Hours</option>
                                <option value="5">5 Hours</option>
                                <option value="24">24 Hours</option>
                                <option value="">Unlimited</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                <input type="checkbox" id="new-admin"> Admin User
                            </label>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                <input type="checkbox" id="new-unlimited"> Unlimited Resources
                            </label>
                        </div>
                        <button type="submit" class="action-btn" style="width: 100%; padding: 12px; background: #4a8a3e; color: #f0ece0; border: none;">
                            Create Account
                        </button>
                    </form>
                </div>
            </div>

            <!-- Audit Logs Tab -->
            <div id="audit-logs" class="tab-content">
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>Admin</th>
                                <th>Action</th>
                                <th>Target</th>
                                <th>Details</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="logs-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api/admin_v5';
        let currentAdmin = null;

        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth';
                return;
            }

            await loadAdminProfile();
            await loadDashboard();
        });

        async function loadAdminProfile() {
            try {
                const response = await fetch(`/api/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success && data.user.is_admin) {
                    currentAdmin = data.user;
                    document.getElementById('admin-name').textContent = currentAdmin.web_username;
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
                window.location.href = '/dashboard';
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/stats`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderStats(data.stats);
                    await loadUsers();
                    await loadVMs();
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }

        function renderStats(stats) {
            const html = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value">${stats.total_users}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-server"></i></div>
                    <div class="stat-label">Total VMs</div>
                    <div class="stat-value">${stats.total_vms}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check"></i></div>
                    <div class="stat-label">Running</div>
                    <div class="stat-value">${stats.active_vms}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-crown"></i></div>
                    <div class="stat-label">Admins</div>
                    <div class="stat-value">${stats.admin_users}</div>
                </div>
            `;
            document.getElementById('dashboard-stats').innerHTML = html;
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    let html = '';
                    for (const user of data.users) {
                        html += `
                            <tr>
                                <td>${user.username}</td>
                                <td><code style="color: #6aaa5a; font-size: 11px;">${user.email}</code></td>
                                <td>${user.real_email}</td>
                                <td>
                                    <span class="badge ${user.is_active ? 'active' : 'inactive'}">
                                        ${user.is_active ? 'Active' : 'Inactive'}
                                    </span>
                                    ${user.is_admin ? '<span class="badge admin">Admin</span>' : ''}
                                </td>
                                <td>${user.vm_count}/${user.vm_quota || '∞'}</td>
                                <td>
                                    <button class="action-btn" onclick="suspendUser('${user.id}', ${user.is_active})">
                                        ${user.is_active ? 'Suspend' : 'Activate'}
                                    </button>
                                </td>
                            </tr>
                        `;
                    }
                    document.getElementById('users-list').innerHTML = html;
                }
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        async function loadVMs() {
            try {
                const response = await fetch(`${API_BASE}/vms`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    let html = '';
                    for (const vm of data.vms) {
                        html += `
                            <tr>
                                <td>${vm.name}</td>
                                <td>${vm.user_id}</td>
                                <td><span class="badge ${vm.status === 'running' ? 'active' : 'inactive'}">${vm.status}</span></td>
                                <td>${vm.os_type}</td>
                                <td>${new Date(vm.created_at).toLocaleDateString()}</td>
                                <td>
                                    <button class="action-btn danger" onclick="deleteVM('${vm.id}')">Delete</button>
                                </td>
                            </tr>
                        `;
                    }
                    document.getElementById('vms-list').innerHTML = html;
                }
            } catch (error) {
                console.error('Failed to load VMs:', error);
            }
        }

        async function createAccount(event) {
            event.preventDefault();
            
            try {
                const response = await fetch(`${API_BASE}/users/create`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        real_email: document.getElementById('new-email').value,
                        lifetime_hours: document.getElementById('new-lifetime').value || null,
                        is_admin: document.getElementById('new-admin').checked,
                        is_unlimited: document.getElementById('new-unlimited').checked
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`Account created!\n\nUsername: ${data.user.username}\nPassword: ${data.user.password}\nVPS Email: ${data.user.vps_email}`);
                    event.target.reset();
                    await loadUsers();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        }

        function switchTab(tabName) {
            // Update content
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            // Update sidebar
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            event.target.closest('.sidebar-link').classList.add('active');
            
            // Update page title
            const labels = {
                'dashboard': { title: 'Dashboard', icon: 'chart-line' },
                'users': { title: 'User Management', icon: 'users' },
                'vms': { title: 'VM Management', icon: 'server' },
                'create-account': { title: 'Create Account', icon: 'user-plus' },
                'audit-logs': { title: 'Audit Logs', icon: 'file-alt' }
            };
            
            if (labels[tabName]) {
                document.getElementById('page-title').textContent = labels[tabName].title;
                document.getElementById('page-icon').className = `fas fa-${labels[tabName].icon}`;
            }
            
            // Reload data
            if (tabName === 'users') loadUsers();
            if (tabName === 'vms') loadVMs();
            if (tabName === 'audit-logs') loadAuditLogs();
        }

        async function suspendUser(userId, isActive) {
            try {
                const endpoint = isActive ? 'suspend' : 'activate';
                const response = await fetch(`${API_BASE}/users/${userId}/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadUsers();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        }

        async function deleteVM(vmId) {
            if (!confirm('Delete this VM?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/vms/${vmId}/delete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadVMs();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        }

        async function loadAuditLogs() {
            try {
                const response = await fetch(`${API_BASE}/audit-logs`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    let html = '';
                    for (const log of data.logs) {
                        html += `
                            <tr>
                                <td>${log.admin_id}</td>
                                <td><strong>${log.action}</strong></td>
                                <td>${log.target_user_id || log.target_vm_id || '-'}</td>
                                <td>${log.details}</td>
                                <td>${new Date(log.timestamp).toLocaleString()}</td>
                            </tr>
                        `;
                    }
                    document.getElementById('logs-list').innerHTML = html;
                }
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }

        function logout() {
            fetch(`/api/auth/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            }).then(() => {
                localStorage.removeItem('token');
                window.location.href = '/auth';
            });
        }
    </script>
</body>
</html>
