version: '3.8'

services:
  app:
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 16G
    environment:
      - WORKERS=16
      - THREADS=4
      - GITHUB_POOL_SIZE=50
      - MAX_WORKERS=50
    ports:
      - "80:5000"
      - "443:5000"
